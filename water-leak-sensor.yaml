# Water Leak Sensor - Xiao ESP32-S3
# USB-C powered, detects water via conductive probes

substitutions:
  name: water-leak-sensor
  friendly_name: "Water Leak Sensor"
  probe_pin: GPIO1
  led_pin: GPIO2

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_cpu: 240000000L

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

# Enable OTA updates
ota:
  - platform: esphome
    password: !secret ota_password

# WiFi configuration
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Water-Leak-Setup"
    password: "setup12345"

captive_portal:

# ============================================
# BINARY SENSORS
# ============================================

binary_sensor:
  # Water leak detection probe
  - platform: gpio
    pin:
      number: ${probe_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Water Leak"
    id: water_leak
    device_class: moisture
    filters:
      - delayed_on: 100ms  # Confirm detection
      - delayed_off: 1s    # Debounce
    on_press:
      then:
        - light.turn_on: alert_led
        - logger.log: "⚠️ WATER LEAK DETECTED!"
    on_release:
      then:
        - light.turn_off: alert_led
        - logger.log: "Water leak cleared"

  # Status sensor
  - platform: status
    name: "Status"

# ============================================
# LIGHTS
# ============================================

light:
  # Alert LED (red)
  - platform: status_led
    id: alert_led
    pin: ${led_pin}
    name: "Alert LED"
    internal: true  # Don't expose to HA, controlled by leak sensor

# ============================================
# SENSORS
# ============================================

sensor:
  # WiFi signal strength
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  # Uptime
  - platform: uptime
    name: "Uptime"

  # ADC reading from probe (for debugging/tuning)
  - platform: adc
    pin: ${probe_pin}
    name: "Probe Reading"
    id: probe_adc
    update_interval: 10s
    attenuation: 11db
    internal: true  # Debug only

# ============================================
# TEXT SENSORS
# ============================================

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"

# ============================================
# INTERVAL - Periodic check
# ============================================

interval:
  - interval: 30s
    then:
      - if:
          condition:
            binary_sensor.is_on: water_leak
          then:
            - light.turn_on: alert_led
            - delay: 500ms
            - light.turn_off: alert_led
            - delay: 500ms
            - light.turn_on: alert_led
